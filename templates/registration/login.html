{% extends 'base.html' %}
{% load socialaccount %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-5">
            <div class="card shadow">
                <div class="card-header text-center bg-primary text-white">
                    <h3 class="mb-0">
                        <i class="bi bi-google"></i> Sign In
                    </h3>
                </div>
                <div class="card-body p-4">
                    <p class="text-muted text-center mb-4">Use your Google account to sign in.</p>
                    <div class="d-grid">
                        <a href="{% provider_login_url 'google' %}" class="btn btn-outline-dark btn-lg">
                            <i class="bi bi-google"></i>
                            Continue with Google
                        </a>
                    </div>
                </div>
            </div>
            
            <!-- Guest Features Info -->
            <div class="card mt-4">
                <div class="card-body">
                    <h6 class="card-title">
                        <i class="bi bi-info-circle text-info"></i> 
                        You can also browse as a guest
                    </h6>
                    <p class="card-text small text-muted">
                        As a guest, you can search books and post anonymous reviews. 
                        <a href="{% url 'home' %}" class="text-decoration-none">
                            Continue browsing →
                        </a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
